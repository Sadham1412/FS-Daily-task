<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css task9</title>
</head>
<style>
   body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .box {
        background-color: white;
        margin: 40px;
        padding: 30px;
        border: 3px solid #333;
        width: 320px;
        border-radius: 15px;
        box-shadow: 4px 5px 5px ;
        text-align: center;
        transition: 0.3s;
    }
p{
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    

}
</style>
<body >
    <div class="box">
<p> This is the content inside the box</p>
    </div>
</body>
</html>
