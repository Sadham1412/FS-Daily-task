<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Listener</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #218838;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #message {
            margin-top: 20px;
            font-size: 16px;
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Use Event Listener</h1>
        <button id="btn1">Click Here</button>

        <p id="output"></p>
    </div>

<script>
    let button = document.getElementById("btn1");

    button.addEventListener("click", function () {
        alert("Button Clicked using addEventListener");
        document.getElementById("output").textContent = "You clicked the button Activity Done";
    });
</script>

</body>
</html>
