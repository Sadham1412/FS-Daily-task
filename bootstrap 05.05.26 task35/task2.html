<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons & Alert</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5 text-center">

    <h3 class="mb-3">Bootstrap Buttons</h3>

    <button class="btn btn-primary m-2">Primary</button>
    <button class="btn btn-success m-2">Success</button>
    <button class="btn btn-danger m-2">Danger</button>
    <button class="btn btn-outline-success m-2">Outline Success</button>
    <button class="btn btn-warning m-2">Warning</button>

    <div class="alert alert-warning alert-dismissible fade show mt-4">
        This is a dismissible alert box!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
