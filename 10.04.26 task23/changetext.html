<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Change</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
            padding-top: 100px;
        }

        #p1 {
            font-size: 28px;
            color: #333;
            background-color: white;
            display: inline-block;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }


        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
    </style>

</head>
<body>

    <p id="p1">Hello I'm Sadham</p>

    <br>
    <button onclick="changetext()">Click Here</button>

    <script>
        function changetext(){
            document.getElementById("p1").textContent = 'Hi I\'m SOFTWARE DEVELOPER';
            
        }
    </script>

</body>
</html>
