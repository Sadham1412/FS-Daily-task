<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Change</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            padding-top: 100px;
        }

        #p1 {
            font-size: 24px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
            transition: 0.4s;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: #ff5722;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #e64a19;
            transform: scale(1.05);
        }
    </style>

</head>
<body>

    <p id="p1">IF YOU CLICK ME I WILL CHANGE MY ORIGINAL FORM</p>
    <br>
    <button onclick="changestyle()">Click Me</button>

    <script>
        function changestyle(){
            let element = document.getElementById("p1");
            element.style.color = "red";
            element.style.backgroundColor = "yellow";
            element.style.fontFamily = "Times New Roman";
            element.style.fontSize = "28px";
            document.getElementById("p1").textContent="IM FRONT END DEVELOPER  ";
        }
    </script>

</body>
</html>
