<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Content</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      text-align: center;
      padding: 60px;
    }

    #p1 {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      font-size: 18px;
      line-height: 1.6;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      transition: 0.5s;
      max-width: 600px;
      margin: auto;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: #2196f3;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #67821f;
      transform: scale(1.05);
    }

    .highlight {
      background-color: yellow;
      color: red;
      transform: scale(1.03);
    }
  </style>

</head>

<body>

  <p id="p1">
    OLD CONTENT PARAGRAPH Lorem ipsum dolor sit, amet consectetur adipisicing
    elit. Optio, placeat quae...
  </p>

  <button onclick="changepara()">Click Here</button>

  <script>
    function changepara() {
      let para = document.getElementById("p1");

      para.textContent = "NEW CONTENT PARAGRAPH  Welcome to JavaScript DOM!";
    }
  </script>

</body>
</html>
