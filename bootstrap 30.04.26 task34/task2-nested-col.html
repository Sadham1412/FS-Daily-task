<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Grid</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-5">
    <div class="row">

        <div class="col-lg-4 bg-primary text-white p-3">Column 1</div>

        <div class="col-lg-4 bg-success text-white p-3">
            <div class="row">
                <div class="col-6 bg-warning text-dark p-2">Sub 1</div>
                <div class="col-6 bg-info text-dark p-2">Sub 2</div>
            </div>
        </div>

        <div class="col-lg-4 bg-danger text-white p-3">Column 3</div>

    </div>
</div>
</body>
</html>
