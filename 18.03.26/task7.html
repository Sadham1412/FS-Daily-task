<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        body{
            background-color: rgb(136, 136, 215);
            text-align: center;
        }
        .container6{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .table1 {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px; 
            overflow: hidden;
        }

        .table1 th,
        .table1 td {
            padding: 14px 16px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.12);

        }

        .table1 th {
            background-color: rgba(66, 103, 167, 0.9);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
