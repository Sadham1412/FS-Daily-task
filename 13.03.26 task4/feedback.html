<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback form </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h2 {
            color: #333;
        }
        label {
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        h2{
            text-align: center;
        }
    </style>
</head>
<body>
    <h2><mark>Feedback Form</mark></h2>

<form>
<strong>Name:</strong><br>
<input type="text" placeholder="Enter your name "><br><br>

<strong>Email:</strong><br>
<input type="email" placeholder="Enter your email "><br><br>

<strong>Your Feedback:</strong><br>
<textarea rows="4" cols="30" placeholder="Enter your feedback "></textarea><br><br>
<center>
<small><em><u>Your feedback helps us improve our service.</u></em></small><br><br>
<button onclick="alert('submit successfully')">Submit</button>
</center>
</form>

</body>
</html>
